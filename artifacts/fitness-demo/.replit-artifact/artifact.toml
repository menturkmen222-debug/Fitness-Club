kind = "web"
previewPath = "/"
title = "Fitness Club Demo"
version = "1.0.0"
id = "artifacts/fitness-demo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25466

[services.development]
run = "pnpm --filter @workspace/fitness-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitness-demo", "run", "build" ]
publicDir = "artifacts/fitness-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25466"
BASE_PATH = "/"
