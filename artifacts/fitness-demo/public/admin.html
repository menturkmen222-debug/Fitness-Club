<!DOCTYPE html>
<html lang="tk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FitClub — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#EF4444;--red-dark:#B91C1C;--red-rgb:239,68,68;
  --orange:#F97316;--orange-rgb:249,115,22;
  --green:#10B981;--green-rgb:16,185,129;
  --cyan:#06B6D4;--yellow:#F59E0B;--purple:#8B5CF6;
  --bg:#060608;--bg2:#080810;
  --sidebar-bg:#060609;
  --surface:#0E0E16;--surface2:#161622;--surface3:#1E1E2E;
  --border:rgba(255,255,255,.06);--border-hover:rgba(239,68,68,.4);
  --border-active:rgba(239,68,68,.6);
  --text:#F0EEF8;--text-muted:#6B6882;--text-dim:#3A384E;
  --success:#10B981;--warning:#F59E0B;--danger:#EF4444;--info:#06B6D4;
  --sidebar-w:256px;
  --topbar-h:60px;
  --radius-sm:8px;--radius:12px;--radius-lg:16px;--radius-xl:20px;
  --shadow-sm:0 2px 8px rgba(0,0,0,.4);
  --shadow:0 4px 20px rgba(0,0,0,.5);
  --shadow-lg:0 12px 40px rgba(0,0,0,.6);
  --shadow-glow:0 0 30px rgba(239,68,68,.12);
}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(239,68,68,.2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(239,68,68,.4)}

/* ================================================================
   LOGIN
================================================================ */
#login-screen{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg2);
  overflow:hidden;
}
.login-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 30%, rgba(239,68,68,.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(249,115,22,.07) 0%, transparent 50%);
}
.login-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%);
}
.login-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
}
.login-orb-1{width:400px;height:400px;background:rgba(239,68,68,.1);top:-100px;right:-80px}
.login-orb-2{width:300px;height:300px;background:rgba(249,115,22,.08);bottom:-60px;left:-60px}
.login-card{
  position:relative;z-index:2;
  width:420px;
  background:rgba(8,8,16,.92);
  border:1px solid rgba(255,255,255,.07);
  border-radius:var(--radius-xl);
  padding:44px 40px 36px;
  backdrop-filter:blur(24px);
  box-shadow:
    0 0 0 1px rgba(239,68,68,.12),
    0 40px 100px rgba(0,0,0,.8),
    0 0 80px rgba(239,68,68,.06),
    inset 0 1px 0 rgba(255,255,255,.07);
}
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(239,68,68,.5) 40%,rgba(249,115,22,.4) 70%,transparent 100%);
  border-radius:var(--radius-xl) var(--radius-xl) 0 0;
}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo .icon{
  width:70px;height:70px;
  background:linear-gradient(140deg,#EF4444 0%,#DC2626 50%,#F97316 100%);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  box-shadow:
    0 0 0 1px rgba(239,68,68,.4),
    0 8px 32px rgba(239,68,68,.45),
    0 0 60px rgba(239,68,68,.15),
    inset 0 1px 0 rgba(255,255,255,.3);
}
.login-logo h1{
  font-size:24px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-logo p{color:rgba(255,255,255,.3);font-size:10.5px;margin-top:6px;text-transform:uppercase;letter-spacing:2px;font-weight:600}
.form-field{margin-bottom:14px}
.form-field label{
  display:block;font-size:11px;font-weight:700;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;
}
.form-field input{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--radius);
  padding:12px 16px;
  color:var(--text);font-size:14px;
  transition:all .2s;
}
.form-field input:focus{
  border-color:rgba(239,68,68,.5);
  background:rgba(239,68,68,.04);
  box-shadow:0 0 0 3px rgba(239,68,68,.1);
}
.form-field input::placeholder{color:var(--text-dim)}
.login-remember{
  display:flex;align-items:center;gap:8px;
  margin-bottom:20px;color:var(--text-muted);font-size:13px;cursor:pointer;
}
.login-remember input[type=checkbox]{width:16px;height:16px;accent-color:var(--red)}
.btn-login{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#EF4444,#F97316);
  border-radius:var(--radius);color:#fff;
  font-size:14px;font-weight:700;letter-spacing:.3px;
  transition:all .25s;
  box-shadow:0 4px 20px rgba(239,68,68,.35);
  position:relative;overflow:hidden;
}
.btn-login::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  opacity:0;transition:opacity .2s;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(239,68,68,.45)}
.btn-login:hover::after{opacity:1}
.btn-login:active{transform:translateY(0)}
.login-error{
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
  border-radius:var(--radius-sm);padding:10px 14px;
  color:var(--red);font-size:13px;margin-bottom:14px;display:none;
}
.login-hints{margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,.05)}
.login-hints p{
  font-size:11px;color:var(--text-dim);margin-bottom:5px;
  font-family:'Space Mono',monospace;
}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake .4s ease}

/* ================================================================
   APP LAYOUT
================================================================ */
#app{display:none;height:100vh;overflow:hidden}

/* ----------------------------------------------------------------
   SIDEBAR — PREMIUM REDESIGN
---------------------------------------------------------------- */
.sidebar{
  position:fixed;left:0;top:0;bottom:0;
  width:var(--sidebar-w);
  background:#05050c;
  border-right:1px solid rgba(255,255,255,.05);
  display:flex;flex-direction:column;
  transition:width .3s cubic-bezier(.4,0,.2,1);
  z-index:50;overflow:hidden;
}

/* Layered background: grid + orb glow */
.sidebar::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
  background-size:28px 28px;
  mask-image:linear-gradient(180deg, rgba(0,0,0,.6) 0%, rgba(0,0,0,.2) 60%, transparent 100%);
}
.sidebar::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 180px 260px at 50% 0%, rgba(239,68,68,.1) 0%, transparent 70%),
    radial-gradient(ellipse 120px 120px at 50% 100%, rgba(249,115,22,.05) 0%, transparent 70%);
}

/* Top accent bar */
.sidebar-accent{
  position:absolute;top:0;left:0;right:0;height:2px;z-index:2;
  background:linear-gradient(90deg,transparent 0%,#EF4444 30%,#F97316 70%,transparent 100%);
  opacity:.9;
}

.sidebar.collapsed{width:64px}

/* Logo */
.sidebar-logo{
  padding:16px 14px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.05);
  flex-shrink:0;position:relative;z-index:2;
}
.sidebar-logo .logo-icon{
  width:40px;height:40px;
  background:linear-gradient(140deg,#EF4444 0%,#DC2626 50%,#F97316 100%);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 0 0 1px rgba(239,68,68,.3),0 4px 18px rgba(239,68,68,.4),inset 0 1px 0 rgba(255,255,255,.25);
}
.sidebar-logo .logo-text{overflow:hidden;white-space:nowrap;transition:.3s}
.sidebar-logo .logo-text h2{
  font-size:15px;font-weight:800;letter-spacing:-.3px;
  background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,.65));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sidebar-logo .logo-text p{
  font-size:9px;color:rgba(255,255,255,.3);
  text-transform:uppercase;letter-spacing:1.8px;margin-top:2px;font-weight:600;
}

/* User area */
.sidebar-user{
  padding:10px 12px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.05);
  flex-shrink:0;z-index:2;position:relative;
  background:rgba(255,255,255,.015);
}
.user-avatar{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.08);
  letter-spacing:.5px;
}
.user-info{overflow:hidden;white-space:nowrap;transition:.3s}
.user-info .name{font-size:12.5px;font-weight:700;letter-spacing:-.1px}
.user-info .role{
  font-size:9.5px;color:rgba(255,255,255,.3);
  text-transform:uppercase;letter-spacing:1px;margin-top:2px;font-weight:600;
}

/* Nav */
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0 6px;z-index:2;position:relative}
.sidebar-nav::-webkit-scrollbar{width:0}

.nav-section{
  padding:16px 16px 5px;
  font-size:8.5px;font-weight:800;
  color:rgba(255,255,255,.18);
  text-transform:uppercase;letter-spacing:2px;
  overflow:hidden;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.nav-section::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(255,255,255,.07),transparent);
}

.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:6px 8px;margin:1px 10px;
  border-radius:10px;cursor:pointer;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  position:relative;white-space:nowrap;overflow:hidden;
}
.nav-item .nav-icon{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.07);
  border-radius:9px;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  color:rgba(255,255,255,.38);
}
.nav-item .nav-icon svg{width:15px;height:15px;stroke-width:1.8px}
.nav-item .nav-label{
  font-size:12.5px;font-weight:500;
  overflow:hidden;transition:opacity .3s;
  color:rgba(255,255,255,.42);
  letter-spacing:-.1px;
}

.nav-item:hover{background:rgba(255,255,255,.045)}
.nav-item:hover .nav-icon{
  background:rgba(239,68,68,.14);
  border-color:rgba(239,68,68,.22);
  color:rgba(239,68,68,.95);
  box-shadow:0 0 10px rgba(239,68,68,.12);
}
.nav-item:hover .nav-label{color:rgba(255,255,255,.88)}

/* Active state — premium full pill */
.nav-item.active{
  background:linear-gradient(100deg,rgba(239,68,68,.16) 0%,rgba(249,115,22,.07) 60%,transparent 100%);
  box-shadow:inset 0 0 0 1px rgba(239,68,68,.12);
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;border-radius:0 4px 4px 0;
  background:linear-gradient(180deg,#EF4444,#F97316);
  box-shadow:0 0 8px rgba(239,68,68,.6);
}
.nav-item.active .nav-icon{
  background:linear-gradient(135deg,rgba(239,68,68,.28),rgba(249,115,22,.16));
  border-color:rgba(239,68,68,.4);
  color:#EF4444;
  box-shadow:0 0 16px rgba(239,68,68,.22),inset 0 1px 0 rgba(255,255,255,.1);
}
.nav-item.active .nav-label{
  color:#fff;font-weight:600;letter-spacing:-.15px;
}

.nav-divider{height:1px;background:rgba(255,255,255,.05);margin:5px 16px}

/* Sidebar footer (logout) */
.sidebar-footer{
  padding:10px 10px;
  border-top:1px solid rgba(255,255,255,.05);
  flex-shrink:0;z-index:2;position:relative;
  background:rgba(0,0,0,.15);
}
.sidebar-footer .nav-item{margin:0}

/* Collapse toggle */
.sidebar-toggle{
  position:absolute;right:-13px;top:24px;
  width:26px;height:26px;
  background:#0d0d18;
  border:1px solid rgba(255,255,255,.1);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:10;
  transition:all .2s;color:rgba(255,255,255,.4);
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.sidebar-toggle:hover{
  background:#1a0a0a;color:var(--red);
  border-color:rgba(239,68,68,.4);
  box-shadow:0 0 12px rgba(239,68,68,.2);
}

/* Collapse hidden elements */
.sidebar.collapsed .logo-text,
.sidebar.collapsed .user-info,
.sidebar.collapsed .nav-label,
.sidebar.collapsed .nav-section{opacity:0;width:0;pointer-events:none}
.sidebar.collapsed .nav-section::after{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:8px}
.sidebar.collapsed .nav-item .nav-icon{width:36px;height:36px;border-radius:10px}

/* ----------------------------------------------------------------
   TOPBAR
---------------------------------------------------------------- */
.main-content{
  margin-left:var(--sidebar-w);
  height:100vh;display:flex;flex-direction:column;
  transition:margin-left .3s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.main-content.collapsed{margin-left:64px}
.topbar{
  height:var(--topbar-h);
  background:rgba(5,5,12,.96);
  border-bottom:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;
  padding:0 22px;gap:14px;
  flex-shrink:0;position:sticky;top:0;z-index:40;
}
.topbar-title{flex:1}
.topbar-title h2{
  font-size:15px;font-weight:700;letter-spacing:-.2px;
  background:linear-gradient(135deg,#fff 50%,rgba(255,255,255,.65));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.topbar-title p{font-size:10.5px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:.2px}
.topbar-search{flex:0 0 250px;position:relative}
.topbar-search input{
  width:100%;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.07);
  border-radius:var(--radius);
  padding:8px 12px 8px 36px;
  color:var(--text);font-size:12.5px;
  transition:all .2s;
}
.topbar-search input:focus{
  border-color:rgba(239,68,68,.28);
  background:rgba(239,68,68,.025);
  box-shadow:0 0 0 3px rgba(239,68,68,.07);
}
.topbar-search input::placeholder{color:rgba(255,255,255,.18)}
.topbar-search .search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);
}
.topbar-search .search-icon svg{width:14px;height:14px}
.topbar-actions{display:flex;align-items:center;gap:8px}
.notif-btn{
  width:36px;height:36px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  transition:all .2s;color:var(--text-muted);
}
.notif-btn:hover{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:var(--red)}
.notif-btn svg{width:16px;height:16px}
.notif-badge{
  position:absolute;top:-5px;right:-5px;
  min-width:18px;height:18px;
  background:var(--red);border-radius:10px;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;
  box-shadow:0 2px 6px rgba(239,68,68,.4);
}
.topbar-avatar{
  width:36px;height:36px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  transition:all .2s;
}
.topbar-avatar:hover{transform:scale(1.05)}
.content{flex:1;overflow-y:auto;padding:22px}
.section{display:none}
.section.active{display:block}

/* ================================================================
   CARDS & GRID
================================================================ */
.card{
  background:linear-gradient(145deg,var(--surface) 0%,rgba(10,10,20,.75) 100%);
  border:1px solid rgba(255,255,255,.055);
  border-radius:var(--radius-lg);
  padding:22px;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);
}
.card:hover{
  border-color:rgba(239,68,68,.18);
  box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 24px rgba(239,68,68,.07);
  transform:translateY(-1px);
}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* KPI Cards — Premium */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.kpi-card{
  background:linear-gradient(145deg,var(--surface) 0%,rgba(10,10,20,.8) 100%);
  border:1px solid rgba(255,255,255,.055);
  border-radius:var(--radius-lg);
  padding:20px;
  transition:all .25s cubic-bezier(.4,0,.2,1);cursor:pointer;
  position:relative;overflow:hidden;
}
.kpi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
}
.kpi-card::after{
  content:'';position:absolute;
  bottom:-50px;right:-50px;
  width:130px;height:130px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(239,68,68,.05),transparent 70%);
  pointer-events:none;
}
.kpi-card:hover{
  border-color:rgba(239,68,68,.2);
  transform:translateY(-3px);
  box-shadow:var(--shadow),0 0 30px rgba(239,68,68,.08);
}
.kpi-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:11px;
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.15);
  margin-bottom:14px;color:var(--red);
  box-shadow:0 4px 12px rgba(239,68,68,.12);
}
.kpi-icon svg{width:19px;height:19px;stroke-width:1.8px}
.kpi-val{
  font-size:26px;font-weight:800;letter-spacing:-.8px;line-height:1;
  background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.kpi-sub{font-size:11.5px;color:rgba(255,255,255,.3);margin-top:5px;letter-spacing:.1px}
.kpi-trend{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:20px;margin-top:10px;
  letter-spacing:.1px;
}
.trend-up{background:rgba(16,185,129,.12);color:var(--green);box-shadow:0 0 8px rgba(16,185,129,.1)}
.trend-down{background:rgba(239,68,68,.12);color:var(--red);box-shadow:0 0 8px rgba(239,68,68,.1)}
.trend-warn{background:rgba(245,158,11,.12);color:var(--yellow)}
.trend-neutral{background:rgba(6,182,212,.12);color:var(--cyan)}
.progress-bar{height:2px;background:rgba(255,255,255,.06);border-radius:4px;margin-top:12px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:.6s cubic-bezier(.4,0,.2,1)}

/* ================================================================
   BUTTONS
================================================================ */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;
  transition:all .2s cubic-bezier(.4,0,.2,1);cursor:pointer;
}
.btn-primary{
  background:linear-gradient(135deg,#EF4444,#F97316);
  color:#fff;
  box-shadow:0 2px 12px rgba(239,68,68,.3);
}
.btn-primary:hover{
  opacity:.95;transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(239,68,68,.45);
}
.btn-secondary{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  color:var(--text);
}
.btn-secondary:hover{
  border-color:rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
}
.btn-ghost{background:transparent;color:var(--text-muted)}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,.05)}
.btn-danger{
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.25);
  color:var(--red);
}
.btn-danger:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4)}
.btn-success{
  background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.25);
  color:var(--green);
}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;flex-shrink:0}

/* ================================================================
   BADGES
================================================================ */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.2px;
}
.badge-active{color:var(--green);background:rgba(16,185,129,.12)}
.badge-expiring{color:var(--yellow);background:rgba(245,158,11,.12)}
.badge-expired{color:var(--red);background:rgba(239,68,68,.12)}
.badge-paused{color:var(--cyan);background:rgba(6,182,212,.12)}
.badge-cancelled{color:var(--text-muted);background:rgba(90,88,112,.12)}
.badge-basic{color:var(--cyan);background:rgba(6,182,212,.12)}
.badge-premium{color:var(--red);background:rgba(239,68,68,.12)}
.badge-elite{color:var(--yellow);background:rgba(245,158,11,.12)}

/* ================================================================
   TABLE
================================================================ */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
thead th{
  padding:11px 14px;text-align:left;
  font-size:10px;font-weight:800;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
tbody td{
  padding:12px 14px;
  border-bottom:1px solid rgba(255,255,255,.03);
  vertical-align:middle;font-size:13px;
}
tbody tr:hover{background:rgba(239,68,68,.03)}
tbody tr:last-child td{border-bottom:none}

/* ================================================================
   FILTER BAR
================================================================ */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:8px 12px;color:var(--text);font-size:13px;
  transition:.2s;
}
.filter-bar input::placeholder{color:var(--text-dim)}
.filter-bar select{cursor:pointer}
.filter-bar input:focus,.filter-bar select:focus{
  border-color:rgba(239,68,68,.35);
  background:rgba(239,68,68,.03);
}
.filter-bar .spacer{flex:1}

/* ================================================================
   MODAL
================================================================ */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);z-index:200;
  display:flex;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(8px);
}
.modal{
  background:var(--surface);
  border:1px solid rgba(239,68,68,.2);
  border-radius:var(--radius-xl);
  width:100%;max-width:680px;max-height:90vh;
  display:flex;flex-direction:column;
  box-shadow:0 40px 100px rgba(0,0,0,.7),var(--shadow-glow);
}
.modal-lg{max-width:900px}
.modal-xl{max-width:1100px}
.modal-sm{max-width:440px}
.modal-header{
  padding:20px 24px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{
  width:28px;height:28px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-muted);font-size:14px;
  transition:.2s;
}
.modal-close:hover{color:var(--text);background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3)}
.modal-body{flex:1;overflow-y:auto;padding:24px}
.modal-footer{
  padding:14px 24px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:flex-end;
  gap:10px;flex-shrink:0;
  background:rgba(255,255,255,.02);
  border-radius:0 0 var(--radius-xl) var(--radius-xl);
}

/* ================================================================
   TABS
================================================================ */
.tabs{
  display:flex;gap:3px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:10px;padding:4px;margin-bottom:20px;flex-wrap:wrap;
}
.tab-btn{
  padding:7px 14px;border-radius:7px;
  font-size:13px;font-weight:500;
  color:var(--text-muted);cursor:pointer;
  transition:all .2s;border:none;background:transparent;
}
.tab-btn.active{
  background:rgba(239,68,68,.15);
  color:var(--red);font-weight:700;
  box-shadow:0 2px 8px rgba(239,68,68,.15);
}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ================================================================
   FORMS
================================================================ */
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:15px}
.form-group label{
  display:block;font-size:11px;font-weight:700;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;
}
.form-group input,.form-group select,.form-group textarea{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:10px 12px;color:var(--text);font-size:13px;transition:.2s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:rgba(239,68,68,.4);
  background:rgba(239,68,68,.03);
  box-shadow:0 0 0 3px rgba(239,68,68,.08);
}
.form-group input::placeholder{color:var(--text-dim)}
.form-group textarea{min-height:80px;resize:vertical}
.form-group select option{background:var(--surface2)}
.form-section-title{
  font-size:11px;font-weight:800;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.8px;
  padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:15px;
}
.checkbox-group{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px}
.checkbox-group input{width:16px;height:16px;accent-color:var(--red)}
.radio-group{display:flex;gap:10px;flex-wrap:wrap}
.radio-btn{
  display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:8px 14px;transition:.2s;
}
.radio-btn:hover{border-color:rgba(239,68,68,.25)}
.radio-btn input{accent-color:var(--red)}

/* ================================================================
   SECTION HEADER — PREMIUM
================================================================ */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:22px;gap:12px;
  padding-bottom:18px;
  border-bottom:1px solid rgba(255,255,255,.04);
  position:relative;
}
.section-header::after{
  content:'';position:absolute;bottom:-1px;left:0;width:80px;height:1px;
  background:linear-gradient(90deg,var(--red),transparent);
}
.section-header h2{
  font-size:19px;font-weight:800;letter-spacing:-.4px;
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,.65));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.section-header h2 svg,.section-header h2 span>svg{
  width:19px;height:19px;color:var(--red);opacity:.9;
}
.section-header .actions{display:flex;gap:8px;flex-wrap:wrap}

/* ================================================================
   TOAST — PREMIUM
================================================================ */
#toast-container{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  display:flex;align-items:center;gap:11px;
  background:rgba(8,8,16,.97);
  border:1px solid rgba(255,255,255,.07);
  border-radius:14px;
  padding:13px 16px;
  min-width:290px;max-width:380px;
  box-shadow:0 20px 50px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.04);
  animation:slideIn .3s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(24px);
  position:relative;overflow:hidden;
}
.toast::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  opacity:.6;
}
.toast-success{border-left:3px solid var(--green)}
.toast-success::before{background:linear-gradient(90deg,var(--green),transparent)}
.toast-error{border-left:3px solid var(--red)}
.toast-error::before{background:linear-gradient(90deg,var(--red),transparent)}
.toast-warning{border-left:3px solid var(--yellow)}
.toast-warning::before{background:linear-gradient(90deg,var(--yellow),transparent)}
.toast-info{border-left:3px solid var(--cyan)}
.toast-info::before{background:linear-gradient(90deg,var(--cyan),transparent)}
.toast-msg{flex:1;font-size:13px;font-weight:500;letter-spacing:-.1px}
.toast-close{background:transparent;color:rgba(255,255,255,.3);font-size:14px;padding:0 2px;transition:.2s;line-height:1}
.toast-close:hover{color:rgba(255,255,255,.8)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-exit{animation:slideOut .3s cubic-bezier(.4,0,.2,1) forwards}
@keyframes slideOut{to{transform:translateX(110%);opacity:0}}

/* ================================================================
   GANTT
================================================================ */
.gantt-wrap{overflow-x:auto}
.gantt-grid{display:grid;min-width:700px}
.gantt-header{display:grid;grid-template-columns:100px 1fr;gap:0;border-bottom:1px solid var(--border)}
.gantt-hours{display:flex;padding-left:0}
.gantt-hour{flex:1;font-size:10px;color:var(--text-muted);text-align:center;padding:4px 0;font-family:'Space Mono',monospace}
.gantt-row{display:grid;grid-template-columns:100px 1fr;border-bottom:1px solid rgba(255,255,255,.03);min-height:44px;align-items:center}
.gantt-label{font-size:12px;color:var(--text-muted);padding:8px 10px;font-weight:600}
.gantt-track{position:relative;height:100%;min-height:44px}
.gantt-now{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:5;opacity:.7}
.gantt-block{
  position:absolute;top:6px;bottom:6px;
  border-radius:7px;display:flex;align-items:center;
  padding:0 8px;font-size:11px;font-weight:600;
  cursor:pointer;overflow:hidden;white-space:nowrap;
  transition:.2s;z-index:2;
}
.gantt-block:hover{opacity:.85;transform:scaleY(1.06)}

/* ================================================================
   TRAINER CARD
================================================================ */
.trainer-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;transition:.25s;
}
.trainer-card:hover{border-color:rgba(239,68,68,.25);transform:translateY(-3px);box-shadow:var(--shadow),var(--shadow-glow)}
.trainer-card-header{padding:24px 20px;text-align:center;position:relative}
.trainer-avatar-lg{
  width:72px;height:72px;border-radius:18px;
  margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:700;
}
.trainer-card-body{padding:0 16px 16px}

/* ================================================================
   CLASS CARD
================================================================ */
.class-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:.25s}
.class-card:hover{border-color:rgba(239,68,68,.2);transform:translateY(-2px);box-shadow:var(--shadow)}
.class-card-header{height:4px}
.class-card-body{padding:16px}

/* ================================================================
   SCHEDULE
================================================================ */
.schedule-grid{display:grid;grid-template-columns:70px repeat(7,1fr);gap:0;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;min-width:700px}
.sch-header{background:var(--surface2);padding:10px 8px;text-align:center;font-size:11px;font-weight:700;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.sch-time{background:rgba(255,255,255,.02);padding:8px 6px;text-align:center;font-size:10px;color:var(--text-muted);font-family:'Space Mono',monospace;border-bottom:1px solid rgba(255,255,255,.03);border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.sch-cell{padding:3px;border-bottom:1px solid rgba(255,255,255,.03);border-right:1px solid var(--border);min-height:40px;cursor:pointer;transition:.15s}
.sch-cell:hover{background:rgba(239,68,68,.04)}
.sch-event{border-radius:5px;padding:3px 6px;font-size:10px;font-weight:600;cursor:pointer;margin:1px;overflow:hidden;transition:.15s}
.sch-event:hover{opacity:.8}

/* ================================================================
   HEATMAP
================================================================ */
.heatmap{display:flex;gap:3px}
.heatmap-col{display:flex;flex-direction:column;gap:3px}
.heatmap-cell{width:12px;height:12px;border-radius:2px;cursor:pointer}
.heatmap-cell[data-v="0"]{background:var(--surface2)}
.heatmap-cell[data-v="1"]{background:rgba(239,68,68,.2)}
.heatmap-cell[data-v="2"]{background:rgba(239,68,68,.45)}
.heatmap-cell[data-v="3"]{background:rgba(239,68,68,.72)}
.heatmap-cell[data-v="4"]{background:var(--red)}

/* ================================================================
   EQUIPMENT
================================================================ */
.eq-status-working{color:var(--green)}
.eq-status-maintenance{color:var(--yellow)}
.eq-status-broken{color:var(--red)}
.eq-status-retired{color:var(--text-muted)}

/* ================================================================
   FINANCE
================================================================ */
.finance-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}

/* ================================================================
   NOTIFICATIONS
================================================================ */
.notif-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  transition:.2s;cursor:pointer;
}
.notif-item:hover{background:rgba(239,68,68,.04)}
.notif-item.unread{background:rgba(239,68,68,.025)}
.notif-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:6px;box-shadow:0 0 6px rgba(239,68,68,.5)}
.notif-dot.read{background:transparent;box-shadow:none}
.notif-content{flex:1}
.notif-text{font-size:13px;margin-bottom:3px}
.notif-time{font-size:11px;color:var(--text-muted)}

/* ================================================================
   LOADER BARS
================================================================ */
.load-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.load-bar-name{width:120px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.load-bar-track{flex:1;height:5px;background:var(--surface2);border-radius:4px;overflow:hidden}
.load-bar-fill{height:100%;border-radius:4px;transition:.6s}
.load-bar-pct{width:40px;font-size:12px;text-align:right;font-family:'Space Mono',monospace;font-weight:700}

/* ================================================================
   MOBILE
================================================================ */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:49;display:none}
.sidebar-overlay.show{display:block}
.hamburger{
  display:none;width:36px;height:36px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  align-items:center;justify-content:center;cursor:pointer;
  color:var(--text-muted);
  transition:.2s;
}
.hamburger:hover{background:rgba(239,68,68,.1);color:var(--red)}
.hamburger svg{width:18px;height:18px}
@media(max-width:900px){
  .sidebar{left:-256px}
  .sidebar.mobile-open{left:0;box-shadow:8px 0 40px rgba(0,0,0,.6)}
  .main-content{margin-left:0!important}
  .hamburger{display:flex}
  .topbar-search{flex:1}
  .kpi-grid,.grid-3,.grid-4,.finance-summary{grid-template-columns:1fr 1fr}
  .form-grid-2{grid-template-columns:1fr}
  .modal{width:100%;height:100%;max-height:100vh;border-radius:0;margin:0}
}
@media(max-width:550px){
  .kpi-grid,.finance-summary{grid-template-columns:1fr}
  .content{padding:14px}
}

/* ================================================================
   MISC
================================================================ */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .ei{
  font-size:48px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;
}
.empty-state .ei svg{width:48px;height:48px;opacity:.25}
.empty-state p{font-size:14px;color:var(--text-muted)}
.stat-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-muted);font-size:13px;flex:1}
.stat-val{font-size:13px;font-weight:700}

/* Icon integration */
.nav-item .nav-icon svg{width:16px;height:16px;display:block}
.nav-item .nav-icon>span{display:inline-flex!important}
.sidebar-toggle svg{width:12px;height:12px}
.search-icon svg{width:14px;height:14px}
.notif-btn svg{width:16px;height:16px}
.btn svg{width:14px;height:14px}
.badge svg{width:11px;height:11px}
.kpi-icon>span{width:100%;height:100%;display:inline-flex!important;align-items:center;justify-content:center}
.kpi-icon svg{width:20px;height:20px}

/* Section header icons */
.section-header h2>span{display:inline-flex;align-items:center}
.section-header h2>span svg{width:20px;height:20px;color:var(--red);opacity:.85}

/* Premium table header row */
thead tr{background:rgba(255,255,255,.02)}

/* Improved content area */
.content{background:var(--bg2)}

/* Chart card titles */
.chart-card-title{
  font-size:13px;font-weight:700;
  display:inline-flex;align-items:center;gap:7px;
  color:var(--text);
}
.chart-card-title>span{display:inline-flex;align-items:center}
.chart-card-title svg{width:14px;height:14px;color:var(--text-muted)}

/* Premium border glow on hover */
.card,.kpi-card,.trainer-card,.class-card{
  transition:border-color .25s,box-shadow .25s,transform .25s;
}

/* Sidebar gradient handled in main sidebar block above */

/* Collapsed sidebar tooltips */
.sidebar.collapsed .nav-item{position:relative}
.sidebar.collapsed .nav-item:hover::after{
  content:attr(data-label);
  position:absolute;left:calc(100% + 14px);top:50%;transform:translateY(-50%);
  background:var(--surface2);border:1px solid var(--border-hover);
  color:var(--text);font-size:12px;font-weight:600;
  padding:5px 12px;border-radius:8px;white-space:nowrap;
  box-shadow:var(--shadow);z-index:100;pointer-events:none;
}

/* Premium input focus glow */
input:focus,select:focus,textarea:focus{
  outline:none;
}

/* Row striping for better readability */
tbody tr:nth-child(even){background:rgba(255,255,255,.012)}

/* Dashboard card stat row */
.stat-row:hover{background:rgba(239,68,68,.03);padding-left:4px;border-radius:6px;transition:.2s}

/* Animated gradient border on focus cards */
@keyframes shimmer{0%{background-position:0 50%}100%{background-position:200% 50%}}

/* Logout nav item danger style */
.sidebar-footer .nav-item:hover .nav-icon{
  background:rgba(239,68,68,.15)!important;
  border-color:rgba(239,68,68,.3)!important;
  color:var(--red)!important;
}
.sidebar-footer .nav-item:hover .nav-label{color:var(--red)!important}

/* Card h3 icon alignment */
.card h3{display:flex;align-items:center;gap:8px}
.card h3>span{display:inline-flex!important;align-items:center;flex-shrink:0}
.card h3 svg{flex-shrink:0}

/* Finance summary KPI color variations */
.kpi-card:nth-child(1) .kpi-icon{background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.2);color:var(--cyan)}
.kpi-card:nth-child(2) .kpi-icon{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.2);color:var(--green)}
.kpi-card:nth-child(3) .kpi-icon{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.2);color:var(--orange)}
.kpi-card:nth-child(4) .kpi-icon{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:var(--red)}
.kpi-card:nth-child(5) .kpi-icon{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.2);color:var(--yellow)}
.kpi-card:nth-child(6) .kpi-icon{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.2);color:var(--purple)}

/* Premium scrollbar for modal body */
.modal-body::-webkit-scrollbar{width:3px}
.modal-body::-webkit-scrollbar-thumb{background:rgba(239,68,68,.3);border-radius:4px}
.sidebar-nav::-webkit-scrollbar{width:0}

/* Section fade-in animation */
.section.active{animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Premium topbar bottom border gradient */
.topbar::after{

// ==================== ICON HELPER ====================
function ico(name,size){
  size=size||16;
  const tmp=document.createElement('span');
  tmp.style.cssText='display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;line-height:0';
  const el=document.createElement('i');
  el.setAttribute('data-lucide',name);
  tmp.appendChild(el);
  lucide.createIcons({nodes:[el]});
  const svg=tmp.querySelector('svg');
  if(!svg)return'';
  svg.setAttribute('width',size);
  svg.setAttribute('height',size);
  svg.style.cssText='display:block;flex-shrink:0';
  return tmp.innerHTML;
}

// ==================== AUTH ====================
let currentUser=null;
function doLogin(){
  const login=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value;
  const remember=document.getElementById('login-remember').checked;
  const users=DB.get('users').length?DB.get('users'):DEFAULT_USERS;
  const u=users.find(x=>x.login===login&&x.password===pass);
  if(!u){
    const err=document.getElementById('login-error');
    err.style.display='block';
    const card=document.getElementById('login-card');
    card.classList.add('shake');
    setTimeout(()=>card.classList.remove('shake'),400);
    return;
  }
  currentUser=u;
  if(remember)localStorage.setItem('gym_session',JSON.stringify(u));
  launchApp();
}
function doLogout(){
  currentUser=null;
  localStorage.removeItem('gym_session');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-error').style.display='none';
}
function checkSession(){
  const s=localStorage.getItem('gym_session');
  if(s){try{currentUser=JSON.parse(s);launchApp();return;}catch{}}
}

// ==================== APP LAUNCH ====================
function launchApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  buildNav();
  updateTopbar();
  navigate('dashboard');
}
function buildNav(){
  const perms=PERMISSIONS[currentUser.role]||[];
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML='';
  const section1=['dashboard','members','classes','trainers','schedule','equipment','nutrition','finance','reports'];
  const section2=['notifications','users','settings'];
  let html='';
  section1.forEach(id=>{
    if(!perms.includes(id))return;
    const item=NAV_ITEMS.find(n=>n.id===id);
    if(item)html+=`<div class="nav-item" id="nav-${id}" onclick="navigate('${id}')" data-label="${item.label}"><span class="nav-icon">${ico(item.icon)}</span><span class="nav-label">${item.label}</span></div>`;
  });
  html+='<div class="nav-divider"></div>';
  section2.forEach(id=>{
    if(!perms.includes(id))return;
    const item=NAV_ITEMS.find(n=>n.id===id);
    if(item)html+=`<div class="nav-item" id="nav-${id}" onclick="navigate('${id}')" data-label="${item.label}"><span class="nav-icon">${ico(item.icon)}</span><span class="nav-label">${item.label}</span></div>`;
  });
  nav.innerHTML=html;
}

// ==================== TOAST ====================
const toast={
  show(msg,type='success',dur=3500){
    const icons={success:ico('check-circle-2',15),error:ico('x-circle',15),warning:ico('alert-triangle',15),info:ico('info',15)};
    const el=document.createElement('div');
    el.className=`toast toast-${type}`;
    el.innerHTML=`<span>${icons[type]}</span><span class="toast-msg">${msg}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(()=>el.classList.add('toast-exit'),dur);
    setTimeout(()=>el.remove(),dur+350);
  },
  success:(m)=>toast.show(m,'success'),
  error:(m)=>toast.show(m,'error'),
  warning:(m)=>toast.show(m,'warning'),
  info:(m)=>toast.show(m,'info'),
};

function openModal(html,size=''){

  ov.className='modal-overlay';

  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
}

  if(ov)ov.remove();
}

    <div class="modal-header"><h3>Tassyklarsynyzmy?</h3><div class="modal-close" onclick="closeModal()">✕</div></div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Ýok</button>
      <button class="btn ${danger?'btn-danger':'btn-primary'}" onclick="(${onYes.toString()})();closeModal()">${danger?'Hawa, Öçür':'Hawa'}</button>
    </div>
  `,'modal-sm');
}

// ==================== HELPERS ====================
function formatDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('ru-RU');}catch{return d;}}
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/(1000*60*60*24));}
function formatTMT(n){return(Number(n)||0).toLocaleString()+' TMT';}
function timeAgo(iso){
  if(!iso)return'';
  const d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<60)return d+'s öň';
  if(d<3600)return Math.floor(d/60)+' min öň';
  if(d<86400)return Math.floor(d/3600)+' sag öň';
  return Math.floor(d/86400)+' gün öň';
}
function getSubBadge(sub){
  if(!sub)return'<span class="badge badge-cancelled">Ýok</span>';
  if(!sub.active)return'<span class="badge badge-expired">Gutaran</span>';
  const days=daysUntil(sub.endDate);
  if(days!==null&&days<=7)return`<span class="badge badge-expiring">Gutarýar (${days}g)</span>`;
  return'<span class="badge badge-active">Aktiw</span>';
}
function getPlanBadge(plan){
  const m={basic:'badge-basic',premium:'badge-premium',elite:'badge-elite'};
  const l={basic:'Başlangyç',premium:'Premium',elite:'Elite'};
  return`<span class="badge ${m[plan]||'badge-basic'}">${l[plan]||plan}</span>`;
}
function getGenderIcon(g){return g==='male'?'♂️':'♀️';}
function calcAge(bd){if(!bd)return'';const d=new Date();const b=new Date(bd);return Math.floor((d-b)/(365.25*24*3600*1000));}
function exportCSV(data,filename){
  if(!data.length){toast.warning('Maglumat ýok');return;}
  const h=Object.keys(data[0]);
  const rows=data.map(r=>h.map(k=>`"${(r[k]??'').toString().replace(/"/g,'""')}"`).join(','));
  const csv=[h.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=filename+'.csv';a.click();
}
function exportJSON(data,filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=filename+'.json';a.click();
}
function globalSearch(val){
  if(!val||val.length<2)return;
}
function switchTab(group,id){
  document.querySelectorAll(`[data-tab-group="${group}"]`).forEach(el=>{
    el.classList.toggle('active',el.dataset.tab===id);
  });
  document.querySelectorAll(`[data-pane-group="${group}"]`).forEach(el=>{
    el.classList.toggle('active',el.dataset.pane===id);
  });
}

function renderTodayGantt(){
  const ganttEl=document.getElementById('today-gantt');
  if(!ganttEl)return;
  const classes=DB.get('classes').filter(c=>c.active);
  const halls=['Kardio Zaly','Güýç Zaly','Ýoga Zaly','Boks Zaly'];
  const startH=6,endH=23,totalH=endH-startH;
  const now=new Date();
  const nowPct=((now.getHours()+now.getMinutes()/60-startH)/totalH)*100;

  const hourLabels=[];
  for(let h=startH;h<=endH;h+=2)hourLabels.push(h<10?'0'+h+':00':h+':00');

  let html=`<div class="gantt-wrap"><div class="gantt-grid">
    <div class="gantt-header">
      <div style="padding:4px 10px;font-size:10px;color:var(--text-muted)">ZAL</div>
      <div style="position:relative;padding:4px 0">
        <div style="display:flex">${hourLabels.map(h=>`<div style="flex:1;font-size:9px;color:var(--text-muted);text-align:center;font-family:'Space Mono',monospace">${h}</div>`).join('')}</div>
      </div>
    </div>`;

  halls.forEach(hall=>{
    const hallClasses=classes.filter(c=>c.hallName===hall);
    const today=new Date().getDay();
    const todayClasses=hallClasses.filter(c=>c.dayOfWeek.includes(today));
    html+=`<div class="gantt-row">
      <div class="gantt-label">${hall.replace(' Zaly','')}</div>
      <div class="gantt-track">
        ${nowPct>0&&nowPct<100?`<div class="gantt-now" style="left:${nowPct}%"></div>`:''}
        ${todayClasses.map(c=>{
          const [sh,sm]=c.startTime.split(':').map(Number);
          const startPct=((sh+sm/60-startH)/totalH)*100;
          const widthPct=(c.duration/60/totalH)*100;
          return`<div class="gantt-block" style="left:${startPct}%;width:${widthPct}%;background:${c.color}22;border:1px solid ${c.color}66;color:${c.color}" title="${c.name} | ${c.trainerName} | ${c.enrolledMembers.length}/${c.maxCapacity}">${c.startTime} ${c.name.split(' ')[0]}</div>`;
        }).join('')}
      </div>
    </div>`;
  });
  html+='</div></div>';
  ganttEl.innerHTML=html;
}

function renderTrainerLoad(){

function filterMembers(){
  const search=(document.getElementById('m-search')?.value||'').toLowerCase();
  const plan=document.getElementById('m-plan')?.value||'';
  const status=document.getElementById('m-status')?.value||'';
  const goal=document.getElementById('m-goal')?.value||'';
  let members=DB.get('members');
  if(search)members=members.filter(m=>(m.firstName+' '+m.lastName+m.phone+m.id).toLowerCase().includes(search));
  if(plan)members=members.filter(m=>m.subscription?.plan===plan);
  if(goal)members=members.filter(m=>m.fitnessGoal===goal);
  if(status==='active')members=members.filter(m=>m.subscription?.active&&(daysUntil(m.subscription?.endDate)||999)>7);
  if(status==='expiring')members=members.filter(m=>m.subscription?.active&&daysUntil(m.subscription?.endDate)<=7&&daysUntil(m.subscription?.endDate)>=0);
  if(status==='expired')members=members.filter(m=>!m.subscription?.active);
  const tbody=document.getElementById('members-tbody');
  if(!tbody)return;
  const trainers=DB.get('trainers');
  const getTrainer=(tid)=>{const t=trainers.find(x=>x.id===tid);return t?t.firstName+' '+t.lastName.charAt(0)+'.':'—';};
  tbody.innerHTML=members.map((m,i)=>`
    <tr>
      <td style="color:var(--text-muted)">${i+1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:34px;height:34px;border-radius:8px;background:${m.gender==='male'?'rgba(239,68,68,.15)':'rgba(6,182,212,.15)'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0">${(m.firstName[0]||'')+(m.lastName[0]||'')}</div>
          <div>
            <div style="font-weight:600">${m.firstName} ${m.lastName}</div>
            <div style="font-size:11px;color:var(--text-muted)">${m.phone}</div>
          </div>
        </div>
      </td>
      <td><span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted)">${m.id}</span></td>
      <td>${getPlanBadge(m.subscription?.plan)}</td>
      <td style="font-size:12px">${m.subscription?.endDate?formatDate(m.subscription.endDate):'—'}</td>
      <td style="font-size:12px;color:var(--text-muted)">${getTrainer(m.personalTrainer)}</td>
      <td>${getSubBadge(m.subscription)}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-sm btn-secondary" onclick="viewMember('${m.id}')">${ico('eye',14)}</button>
          <button class="btn btn-sm btn-secondary" onclick="editMember('${m.id}')">${ico('pencil',14)}</button>
          <button class="btn btn-sm btn-danger" onclick="deleteMember('${m.id}')">${ico('trash-2',14)}</button>
        </div>
      </td>
    </tr>
  `).join('')||'<tr><td colspan="8" class="empty-state">Agza tapylmady</td></tr>';
  document.getElementById('members-count').textContent=`Jemi: ${members.length} agza`;
}

      new Chart(ctx,{type:'line',data:{labels:m.measurements.map(x=>formatDate(x.date)),datasets:[{label:'Agram',data:m.measurements.map(x=>x.weight),borderColor:'#EF4444',tension:.4,pointRadius:4},{label:'Myşsa',data:m.measurements.map(x=>x.muscle),borderColor:'#10B981',tension:.4,pointRadius:4},{label:'Ýag%',data:m.measurements.map(x=>x.bodyFat),borderColor:'#F59E0B',tension:.4,pointRadius:4}]},options:{responsive:true,plugins:{legend:{labels:{color:'#F0EEF8',font:{size:11}}}},scales:{x:{ticks:{color:'#5A5870'}},y:{ticks:{color:'#5A5870'}}}}});
    },100);
  }
}

function editMember(id){
  const m=DB.find('members',id);

}
function deleteMember(id){
  const m=DB.find('members',id);
  if(!m)return;
  confirmDialog(`"${m.firstName} ${m.lastName}" agzasyny öçürmek isleýärsiňizmi?`,()=>{
    DB.remove('members',id);
    toast.success('Agza öçürildi');
    filterMembers();
  },true);
}
function saveMember(existingId){
  const fn=document.getElementById('mf-fn').value.trim();
  const ln=document.getElementById('mf-ln').value.trim();
  const ph=document.getElementById('mf-ph').value.trim();
  if(!fn||!ln||!ph){toast.error('Hökmany meýdanlary dolduryň!');return;}
  const plan=document.getElementById('mf-plan').value;
  const planPrices={başlangyç:180,premium:300,elite:600};
  const startDate=document.getElementById('mf-start').value||new Date().toISOString().slice(0,10);
  const endDate=new Date(new Date(startDate).setMonth(new Date(startDate).getMonth()+1)).toISOString().slice(0,10);
  const data={firstName:fn,lastName:ln,phone:ph,email:document.getElementById('mf-em').value,birthDate:document.getElementById('mf-bd').value,gender:document.getElementById('mf-gen').value,address:document.getElementById('mf-addr').value,height:+document.getElementById('mf-ht').value||null,weight:+document.getElementById('mf-wt').value||null,fitnessGoal:document.getElementById('mf-goal').value,healthNotes:document.getElementById('mf-health').value,subscription:{plan,startDate,endDate,active:true,price:planPrices[plan]||180,paymentType:'monthly'},personalTrainer:document.getElementById('mf-trainer').value||null,source:document.getElementById('mf-source').value,notes:document.getElementById('mf-notes').value};
  if(existingId){
    DB.update('members',existingId,data);
    toast.success('Agza maglumatlary täzelendi!');
  } else {
    const newId='MBR'+String(DB.get('members').length+1).padStart(3,'0');
    DB.add('members',{...data,id:newId,memberSince:startDate,attendance:[],measurements:[],subscribedClasses:[]});
    toast.success('Täze agza goşuldy!');
    addNotification('member','user-plus',`Täze agza ýazyldy — ${fn} ${ln} (${plan})`,'members');
  }
  closeModal();
  if(currentSection==='members')filterMembers();
  if(currentSection==='dashboard')renderSection('dashboard');
}
function renewSubscriptionModal(memberId){
  const m=DB.find('members',memberId);
  if(!m)return;
  const plans=[{name:'Başlangyç',price:180},{name:'Premium',price:300},{name:'Elite',price:600}];
  openModal(`
  <div class="modal-header"><h3>Abunany Uzat — ${m.firstName} ${m.lastName}</h3><div class="modal-close" onclick="closeModal()">✕</div></div>
  <div class="modal-body">
    <div class="form-group"><label>Plan *</label><select id="ren-plan">${plans.map(p=>`<option value="${p.name.toLowerCase()}" data-price="${p.price}" ${m.subscription?.plan===p.name.toLowerCase()?'selected':''}>${p.name} — ${p.price} TMT/aý</option>`).join('')}</select></div>
    <div class="form-grid-2">
      <div class="form-group"><label>Başlangyç senesi</label><input id="ren-start" type="date" value="${new Date().toISOString().slice(0,10)}"/></div>
      <div class="form-group"><label>Möhleti (aý)</label><select id="ren-months"><option value="1">1 aý</option><option value="3">3 aý</option><option value="6">6 aý</option><option value="12">12 aý</option></select></div>
    </div>
    <div class="form-group"><label>Töleg görnüşi</label><select id="ren-pay"><option value="cash">Nagt</option><option value="transfer">Geçiriş</option><option value="card">Kart</option></select></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">Ýatyr</button>
    <button class="btn btn-primary" onclick="doRenewSubscription('${memberId}')">${ico('credit-card',14)} Uzat we Töleg Ýaz</button>
  </div>
  `,'modal-sm');
}
function doRenewSubscription(memberId){
  const plan=document.getElementById('ren-plan').value;
  const months=+document.getElementById('ren-months').value||1;
  const start=document.getElementById('ren-start').value;
  const payMethod=document.getElementById('ren-pay').value;
  const prices={başlangyç:180,premium:300,elite:600};
  const price=prices[plan]||180;
  const endDate=new Date(new Date(start).setMonth(new Date(start).getMonth()+months)).toISOString().slice(0,10);
  DB.update('members',memberId,{subscription:{plan,startDate:start,endDate,active:true,price,paymentType:'monthly'}});
  const m=DB.find('members',memberId);
  DB.add('transactions',{type:'income',category:'subscription',memberId,memberName:`${m.firstName} ${m.lastName}`,amount:price*months,currency:'TMT',paymentMethod:payMethod,reference:`${months} aý ${plan} abuna`,date:start,receivedBy:currentUser.id,notes:''});
  toast.success('Abuna uzadyldy!');
  addNotification('finance','wallet',`Töleg alyndy — ${m.firstName} ${m.lastName} ${formatTMT(price*months)}`,'finance');
  closeModal();
  if(currentSection==='members')filterMembers();
}

function addMinutes(time,mins){
  const[h,m]=time.split(':').map(Number);
  const total=h*60+m+mins;
  return String(Math.floor(total/60)%24).padStart(2,'0')+':'+String(total%60).padStart(2,'0');
}

function enrollMemberModal(classId){

  if(!cls)return;
  const members=DB.get('members').filter(m=>!cls.enrolledMembers?.includes(m.id));
  openModal(`
  <div class="modal-header"><h3>Agza Goşmak</h3><div class="modal-close" onclick="closeModal()">✕</div></div>
  <div class="modal-body">

      <select id="enroll-member"><option value="">Saýla...</option>${members.map(m=>`<option value="${m.id}">${m.firstName} ${m.lastName}</option>`).join('')}</select>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">Ýatyr</button>
    <button class="btn btn-primary" onclick="doEnroll('${classId}')">Goş</button>
  </div>
  `,'modal-sm');
}
function doEnroll(classId){
  const mid=document.getElementById('enroll-member').value;
  if(!mid){toast.error('Agzany saýla!');return;}
  const cls=DB.find('classes',classId);
  if(!cls)return;
  const enrolled=[...(cls.enrolledMembers||[]),mid];
  DB.update('classes',classId,{enrolledMembers:enrolled});
  toast.success('Agza sapaga goşuldy!');
  closeModal();
  viewClass(classId);
}
function unenrollMember(classId,memberId){
  const cls=DB.find('classes',classId);
  if(!cls)return;
  const enrolled=(cls.enrolledMembers||[]).filter(id=>id!==memberId);
  DB.update('classes',classId,{enrolledMembers:enrolled});
  toast.info('Agza sapakdan çykaryldy');
  closeModal();
  viewClass(classId);
}

function renderSchedule(ca){
  const classes=DB.get('classes').filter(c=>c.active);
  const days=['Ýek','Duş','Sal','Çar','Per','Ann','Şen'];
  const hours=[];for(let h=6;h<=22;h++)hours.push(h<10?'0'+h+':00':h+':00');
  const conflicts=detectConflicts(classes);
  ca.innerHTML=`
  <div class="section-header">
    <h2>${ico('calendar',20)} Sapak Tertibi</h2>
    <div class="actions">
      ${conflicts.length?`<span class="badge badge-expiring">${ico('alert-triangle',12)} ${conflicts.length} çaknyşyk</span>`:''}
      <button class="btn btn-primary" onclick="openAddClassModal()">+ Sapak Goş</button>
    </div>
  </div>
  ${conflicts.length?`<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px"><strong>${ico('alert-triangle',14)} Çaknyşyk bar:</strong> ${conflicts.map(c=>`${c.class1.name} & ${c.class2.name}`).join(', ')}</div>`:''}
  <div style="overflow-x:auto">
    <div class="schedule-grid" id="sch-grid" style="min-width:700px">
      <div class="sch-header">Wagt</div>
      ${days.map(d=>`<div class="sch-header">${d}</div>`).join('')}
      ${hours.map(hr=>{
        const h=parseInt(hr);
        return`<div class="sch-time">${hr}</div>${days.map((_,di)=>{
          const slotClasses=classes.filter(c=>c.dayOfWeek.includes(di)&&parseInt(c.startTime)===h);
          return`<div class="sch-cell" onclick="newClassAtSlot(${di},'${hr}')">${slotClasses.map(c=>`<div class="sch-event" style="background:${c.color}33;border-left:2px solid ${c.color};color:${c.color}" onclick="event.stopPropagation();viewClass('${c.id}')" title="${c.name} | ${c.trainerName}">${c.name.split(' ').slice(0,2).join(' ')}</div>`).join('')}</div>`;
        }).join('')}`;
      }).join('')}
    </div>
  </div>`;
}
function detectConflicts(classes){
  const conflicts=[];
  classes.forEach((c1,i)=>{
    classes.forEach((c2,j)=>{
      if(i>=j)return;
      if(c1.hallId!==c2.hallId)return;
      const shared=c1.dayOfWeek.filter(d=>c2.dayOfWeek.includes(d));
      if(!shared.length)return;
      const[h1,m1]=c1.startTime.split(':').map(Number);
      const[h2,m2]=c2.startTime.split(':').map(Number);
      const s1=h1*60+m1,e1=s1+c1.duration;
      const s2=h2*60+m2,e2=s2+c2.duration;
      if(s1<e2&&e1>s2)conflicts.push({class1:c1,class2:c2,days:shared});
    });
  });
  return conflicts;
}
function newClassAtSlot(day,time){
  openAddClassModal({dayOfWeek:[day],startTime:time});
}

function generateReport(){
  const type=document.getElementById('rpt-type').value;
  const fmt=document.getElementById('rpt-fmt').value;
  const data=DB.get(type==='finance'?'transactions':type);
  const fname=type+'_'+new Date().toISOString().slice(0,10);
  if(fmt==='csv')exportCSV(data.map(d=>flattenObj(d)),fname);
  else exportJSON(data,fname);
  toast.success('Hasabat döredildi!');
}
function flattenObj(obj,prefix=''){
  return Object.keys(obj).reduce((acc,k)=>{
    const v=obj[k];
    const key=prefix?prefix+'_'+k:k;
    if(v&&typeof v==='object'&&!Array.isArray(v)&&!(v instanceof Date)){Object.assign(acc,flattenObj(v,key));}
    else{acc[key]=Array.isArray(v)?v.join(';'):v;}
    return acc;
  },{});
}

      <div class="form-group"><label>Login *</label><input id="uf-login" value="${prefill?.login||''}" placeholder="login"/></div>
    </div>
    <div class="form-grid-2">
      <div class="form-group"><label>Parol ${prefill?'(boş goýsaň üýtgemez)':' *'}</label><input id="uf-pass" type="password" placeholder="••••••••"/></div>
      <div class="form-group"><label>Rol *</label><select id="uf-role"><option value="superadmin" ${prefill?.role==='superadmin'?'selected':''}>Baş Admin</option><option value="manager" ${prefill?.role==='manager'?'selected':''}>Menejer</option><option value="receptionist" ${prefill?.role==='receptionist'?'selected':''}>Kabul Işgäri</option><option value="trainer" ${prefill?.role==='trainer'?'selected':''}>Tälimçi</option></select></div>
    </div>
    <div class="form-group"><label>Avatar (2 harp)</label><input id="uf-av" value="${prefill?.avatar||''}" maxlength="2" placeholder="BA" style="width:80px"/></div>
    <div class="form-group"><label>Reňk</label><input id="uf-color" type="color" value="${prefill?.color||'#EF4444'}"/></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">Ýatyr</button>
    <button class="btn btn-primary" onclick="saveUser(${prefill?.id||'null'})">${ico('save',14)} Sakla</button>
  </div>
  `,'modal-sm');
}
function editUser(id){const u=DB.get('users').find(x=>x.id===id);if(u)openAddUserModal(u);}
function deleteUser(id){
  if(id===currentUser.id){toast.error('Öz hasabyňy öçürip bilmersiň!');return;}
  confirmDialog('Bu ulanyjyny öçürmek?',()=>{
    const users=DB.get('users').filter(u=>u.id!==id);DB.set('users',users);toast.success('Ulanyjy öçürildi');renderUsers(document.getElementById('content-area'));
  },true);
}
function saveUser(existingId){
  const name=document.getElementById('uf-name').value.trim();
  const login=document.getElementById('uf-login').value.trim();
  const pass=document.getElementById('uf-pass').value;
  if(!name||!login){toast.error('At we loginy giriziň!');return;}
  if(!existingId&&!pass){toast.error('Paroly giriziň!');return;}
  const users=DB.get('users');
  if(existingId!==null){
    const idx=users.findIndex(u=>u.id===existingId);
    if(idx>=0){users[idx]={...users[idx],name,login,role:document.getElementById('uf-role').value,avatar:document.getElementById('uf-av').value||name.slice(0,2).toUpperCase(),color:document.getElementById('uf-color').value,...(pass?{password:pass}:{})};DB.set('users',users);toast.success('Ulanyjy täzelendi!');}
  } else {
    const maxId=Math.max(...users.map(u=>u.id||0),0);
    users.push({id:maxId+1,name,login,password:pass,role:document.getElementById('uf-role').value,avatar:document.getElementById('uf-av').value||name.slice(0,2).toUpperCase(),color:document.getElementById('uf-color').value});
    DB.set('users',users);toast.success('Täze ulanyjy goşuldy!');
  }
  closeModal();renderUsers(document.getElementById('content-area'));
}

// ==================== SETTINGS ====================
function renderSettings(ca){
  const s=DB.get('settings')||{};
  const plans=s.plans||[{id:1,name:'Başlangyç',price:180,desc:'Gym + Kardio'},{id:2,name:'Premium',price:300,desc:'Gym + Kardio + Topar sapaklar'},{id:3,name:'Elite',price:600,desc:'Hemmesi + Çäksiz şahsy'}];
  const halls=s.halls||[];
  ca.innerHTML=`
  <div class="section-header"><h2>${ico('settings',20)} Ulgam Sazlamalary</h2></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="club" data-tab-group="settings" onclick="switchTab('settings','club')">Klub Maglumatlary</button>
    <button class="tab-btn" data-tab="plans" data-tab-group="settings" onclick="switchTab('settings','plans')">Abuna Meýilnamalary</button>
    <button class="tab-btn" data-tab="halls" data-tab-group="settings" onclick="switchTab('settings','halls')">Zallar</button>
    <button class="tab-btn" data-tab="data" data-tab-group="settings" onclick="switchTab('settings','data')">Maglumat Dolandyrma</button>
  </div>
  <!-- Club info -->
  <div class="tab-pane active card" data-pane="club" data-pane-group="settings">
    <div class="form-grid-2">
      <div class="form-group"><label>Klub ady *</label><input id="st-name" value="${s.clubName||'FitClub Aşgabat'}"/></div>
      <div class="form-group"><label>Şäher *</label><input id="st-city" value="${s.city||'Aşgabat'}"/></div>
      <div class="form-group"><label>Telefon *</label><input id="st-phone" value="${s.phone||''}"/></div>
      <div class="form-group"><label>E-poçta</label><input id="st-email" value="${s.email||''}"/></div>
      <div class="form-group"><label>Instagram</label><input id="st-insta" value="${s.instagram||''}" placeholder="@fitclub_ag"/></div>
      <div class="form-group"><label>Açylyş ýyly</label><input id="st-year" type="number" value="${s.openYear||2019}"/></div>
    </div>
    <div class="form-group"><label>Adres *</label><input id="st-addr" value="${s.address||''}"/></div>
    <button class="btn btn-primary" onclick="saveClubSettings()">${ico('save',14)} Sakla</button>
  </div>
  <!-- Plans -->
  <div class="tab-pane card" data-pane="plans" data-pane-group="settings">
    ${plans.map(p=>`<div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface2);border-radius:10px;margin-bottom:10px">
      <div style="flex:1"><div style="font-weight:700">${p.name}</div><div style="font-size:12px;color:var(--text-muted)">${p.desc}</div></div>
      <div style="font-weight:700;color:var(--red);font-size:15px">${p.price} TMT</div>
      <button class="btn btn-sm btn-secondary" onclick="editPlan(${p.id})">${ico('pencil',14)}</button>
    </div>`).join('')}
    <button class="btn btn-secondary" style="margin-top:8px" onclick="addPlanModal()">+ Täze Plan</button>
  </div>
  <!-- Halls -->
  <div class="tab-pane card" data-pane="halls" data-pane-group="settings">
    ${halls.map(h=>`<div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface2);border-radius:8px;margin-bottom:8px">
      <div style="flex:1"><div style="font-weight:600">${h.name}</div><div style="font-size:12px;color:var(--text-muted)">Sig'ym: ${h.capacity||'—'}</div></div>
      <span class="badge ${h.status==='open'?'badge-active':'badge-expired'}">${h.status==='open'?'Açyk':'Ýapyk'}</span>
      <button class="btn btn-sm btn-secondary" onclick="editHall(${h.id})">${ico('pencil',14)}</button>
    </div>`).join('')}
    <button class="btn btn-secondary" style="margin-top:8px" onclick="addHallModal()">+ Täze Zal</button>
  </div>
  <!-- Data Management -->
  <div class="tab-pane card" data-pane="data" data-pane-group="settings">
    <h4 style="margin-bottom:14px;font-size:14px">Maglumat Dolandyrma</h4>
    <div style="display:flex;flex-direction:column;gap:10px;max-width:400px">
      <button class="btn btn-secondary" onclick="exportJSON({members:DB.get('members'),classes:DB.get('classes'),trainers:DB.get('trainers'),equipment:DB.get('equipment'),transactions:DB.get('transactions')},'fitclub_backup')">${ico('upload',14)} Ähli Maglumatlary Eksport et (JSON)</button>
      <button class="btn btn-secondary" onclick="importData()">${ico('download',14)} Maglumatlary Import et (JSON)</button>
      <button class="btn btn-secondary" onclick="loadDemoDataFresh()">${ico('refresh-cw',14)} Demo Maglumatlary Täzeden Ýükle</button>
      <button class="btn btn-danger" style="margin-top:10px" onclick="clearAllData()">${ico('alert-triangle',14)} Ähli Maglumatlary Pozmak</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="processImport(this)"/>
  </div>`;
}
function saveClubSettings(){
  const s=DB.get('settings')||{};
  DB.set('settings',{...s,clubName:document.getElementById('st-name').value,city:document.getElementById('st-city').value,phone:document.getElementById('st-phone').value,email:document.getElementById('st-email').value,instagram:document.getElementById('st-insta').value,openYear:+document.getElementById('st-year').value,address:document.getElementById('st-addr').value});
  toast.success('Sazlamalar saklandy!');
}
function addPlanModal(){
  openModal(`
  <div class="modal-header"><h3>Täze Abuna Plany</h3><div class="modal-close" onclick="closeModal()">✕</div></div>
  <div class="modal-body">
    <div class="form-group"><label>Ady *</label><input id="pl-name" placeholder="Plan ady"/></div>
    <div class="form-group"><label>Baha (TMT/aý) *</label><input id="pl-price" type="number" placeholder="250"/></div>
    <div class="form-group"><label>Açyklama</label><input id="pl-desc" placeholder="Goşulýanlar..."/></div>
  </div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Ýatyr</button><button class="btn btn-primary" onclick="savePlan()">Sakla</button></div>
  `,'modal-sm');
}
function savePlan(){
  const s=DB.get('settings')||{};
  const plans=s.plans||[];
  const maxId=Math.max(...plans.map(p=>p.id||0),0);
  plans.push({id:maxId+1,name:document.getElementById('pl-name').value,price:+document.getElementById('pl-price').value||0,desc:document.getElementById('pl-desc').value});
  DB.set('settings',{...s,plans});toast.success('Plan goşuldy!');closeModal();renderSettings(document.getElementById('content-area'));
}
function addHallModal(){
  openModal(`
  <div class="modal-header"><h3>Täze Zal</h3><div class="modal-close" onclick="closeModal()">✕</div></div>
  <div class="modal-body">
    <div class="form-group"><label>Ady *</label><input id="hl-name" placeholder="Zal ady"/></div>
    <div class="form-group"><label>Sig'ym *</label><input id="hl-cap" type="number" placeholder="15"/></div>
    <div class="form-group"><label>Ýagdaý</label><select id="hl-st"><option value="open">Açyk</option><option value="closed">Ýapyk</option></select></div>
  </div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Ýatyr</button><button class="btn btn-primary" onclick="saveHall()">Sakla</button></div>
  `,'modal-sm');
}
function saveHall(){
  const s=DB.get('settings')||{};
  const halls=s.halls||[];
  const maxId=Math.max(...halls.map(h=>h.id||0),0);
  halls.push({id:maxId+1,name:document.getElementById('hl-name').value,capacity:+document.getElementById('hl-cap').value||10,status:document.getElementById('hl-st').value});
  DB.set('settings',{...s,halls});toast.success('Zal goşuldy!');closeModal();renderSettings(document.getElementById('content-area'));
}
function clearAllData(){
  confirmDialog('DİKKAT! Ähli maglumatlar (agzalar, sapaklar, maliýe) hemişelik öçüriler! Dowam etmek?',()=>{
    confirmDialog('Tassykladyňyzmy? Bu amal yzyna gaýtarylyp bilinmez!',()=>{
      ['members','classes','trainers','equipment','transactions','nutrition','notifications','settings','users'].forEach(k=>localStorage.removeItem('gym_'+k));
      localStorage.removeItem('gym_initialized');
      toast.success('Ähli maglumatlar öçürildi. Sahypa täzelenýär...');
      setTimeout(()=>location.reload(),1500);
    },true);
  },true);
}
function loadDemoDataFresh(){
  confirmDialog('Demo maglumatlary täzeden ýüklemek? Häzirki maglumatlar öçüriler.',()=>{
    ['members','classes','trainers','equipment','transactions','nutrition','notifications'].forEach(k=>localStorage.removeItem('gym_'+k));
    localStorage.removeItem('gym_initialized');
    initDemoData();
    toast.success('Demo maglumatlary ýüklendi!');
    renderSettings(document.getElementById('content-area'));
  },true);
}
function importData(){document.getElementById('import-file').click();}
function processImport(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      Object.keys(data).forEach(k=>{if(DB.get(k)!==null)DB.set(k,data[k]);});
      toast.success('Maglumatlar import edildi!');
    }catch{toast.error('JSON faýly nädogry!');}
  };
  reader.readAsText(file);
}

// ==================== INIT ====================
initDemoData();
checkSession();
if(typeof lucide!=='undefined')setTimeout(()=>lucide.createIcons(),500);
</script>
<script>window.addEventListener("DOMContentLoaded",function(){lucide.createIcons();});</script>
</body>
</html>
